workflows:
  acreledger-ios:
    name: AcreLedger iOS
    max_build_duration: 120
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.wsegbert.acreledger

      node: 22
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: "com.wsegbert.acreledger"
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"

      groups:
        - appstore

    cache:
      cache_paths:
        - $HOME/.npm
        - node_modules
        - ios/App/Pods

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci --prefer-offline

      - name: Lint
        script: |
          npm run lint

      - name: Unit tests
        script: |
          npm run test

      - name: Build web bundle and sync to iOS
        script: |
          npm run cap:build

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install

      - name: Set up provisioning profiles settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Set marketing version from package.json
        script: |
          cd ios/App
          PKG_VERSION=$(node -p "require('../../package.json').version.split('-')[0]")
          agvtool new-marketing-version "$PKG_VERSION"

      - name: Set build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/App/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth:
          key_id: $APP_STORE_CONNECT_KEY_ID
          issuer_id: $APP_STORE_CONNECT_ISSUER_ID
          key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true

      email:
        recipients:
          - wsegbert@gmail.com
        notify:
          success: true
          failure: true
